name: Release

on:
  pull_request:
    types: [ closed ]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Re-run lint + tests at merge time; the release is gated on them passing.
  ci:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - uses: offload-project/release-champion@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          draft-release: false
          publish-npm: true
          npm-token: ${{ secrets.PACKAGE_WRITE_TOKEN }}
          npm-registry: 'https://npm.pkg.github.com'
          npm-build-command: 'bun run build'
